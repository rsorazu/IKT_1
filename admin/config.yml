backend:
  name: git-gateway
  branch: main

site_url: https://rsorazu.github.io/IKT_1

media_folder: images
public_folder: /images

locale: es

collections:

  # ── SITE GLOBALS ─────────────────────────────────────────────
  - name: site
    label: "🌐 Web orokorra"
    files:
      - name: site
        label: "Portada eta testu orokorrak"
        file: content/site.json
        format: json
        fields:
          - { label: "Izenburua", name: title, widget: string }
          - { label: "Azpititulua", name: subtitle, widget: string }
          - { label: "Hero titulua", name: hero_title, widget: string }
          - { label: "Hero azpititulua", name: hero_subtitle, widget: text }
          - label: "📢 Abisua"
            name: announcement
            widget: text
            required: false
            hint: "Ikasleentzako abisua portadan (hutsik badago, ez da agertzen)"
          - label: "Abisua aktibo"
            name: announcement_active
            widget: boolean
            default: false
          - { label: "Material testua", name: material_text, widget: text }

  # ── GLOSSARY ─────────────────────────────────────────────────
  - name: glossary
    label: "📖 Hiztegia"
    files:
      - name: glossary
        label: "Hiztegi osoa"
        file: content/glossary.json
        format: json
        fields:
          - label: Sarrerak
            name: entries
            widget: list
            label_singular: Sarrera
            fields:
              - { label: "Terminoa", name: term, widget: string }
              - { label: "Definizioa", name: definition, widget: text }
              - label: "Etiketa (P1, T1...)"
                name: tag
                widget: select
                options: ["T1","T2","T3a","T3b","T3c","P1","P2","P3","P4"]
              - label: "Kolorea"
                name: color
                widget: select
                options:
                  - { label: "Urdina (sentsoreak)", value: "#2E7DD1" }
                  - { label: "Morea (begiztak)", value: "#7A4FC9" }
                  - { label: "Laranja (aldagaiak)", value: "#D4880A" }
                  - { label: "Gorria (gertaerak)", value: "#D94060" }
                  - { label: "Berdea (P4)", value: "#3A8C3A" }
                  - { label: "Urdin-berdea (sentsoreak)", value: "#3A8FAA" }
                  - { label: "Marroia (teoria)", value: "#8B7355" }

  # ── TEORIA BLOCKS ─────────────────────────────────────────────
  - name: teoria
    label: "📚 Teoria blokeak"
    files:

      - name: t1
        label: "T1 — Pentsamendu Konputazionala"
        file: content/t1.json
        format: json
        fields:
          - { label: "Izenburua", name: title, widget: string }
          - { label: "Deskribapena", name: description, widget: string }
          - label: "Lau oinarriak"
            name: pillars
            widget: list
            fields:
              - { label: "Ikonoa (emoji)", name: icon, widget: string }
              - { label: "Izenburua", name: title, widget: string }
              - { label: "Testua", name: text, widget: text }
              - { label: "Kolorea (hex)", name: color, widget: string }
          - label: "Argazkia — 'Zer da?' fitxa"
            name: "tabs[0].photo"
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - { label: "Algoritmo adibide sarrera testua", name: "tabs[1].example_intro", widget: text }
          - label: "Info-kutxa (Kontuan hartu)"
            name: "tabs[1].info_box"
            widget: object
            fields:
              - { label: "Izenburua", name: title, widget: string }
              - { label: "Testua", name: text, widget: text }
          - label: "Argazkia — Algoritmoak fitxa"
            name: "tabs[1].photo"
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - label: "Argazkia — Deskonposaketa fitxa"
            name: "tabs[2].photo"
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - label: "Laburpena"
            name: summary
            widget: object
            fields:
              - { label: "Izenburua", name: heading, widget: string }
              - { label: "Sarrera", name: intro, widget: string }
              - label: "Puntuak"
                name: points
                widget: list
                field: { label: "Puntua", name: item, widget: string }
              - { label: "Hurrengo blokea", name: next, widget: string }
          - label: "Ariketak (test galderak)"
            name: quiz
            widget: list
            label_singular: "Galdera"
            fields:
              - { label: "Galdera", name: question, widget: text }
              - label: "Aukerak (4)"
                name: options
                widget: list
                field: { label: "Aukera", name: item, widget: string }
              - { label: "Erantzun zuzena (0-3)", name: correct, widget: number, value_type: int }
              - { label: "Feedbacka", name: feedback, widget: text }

      - name: t2
        label: "T2 — Sentsoreak eta Eragileak"
        file: content/t2.json
        format: json
        fields:
          - { label: "Izenburua", name: title, widget: string }
          - { label: "Deskribapena", name: description, widget: string }
          - { label: "Sentsore-izenburua", name: sensor_heading, widget: string }
          - { label: "Sentsore-deskribapena", name: sensor_description, widget: text }
          - label: "Sentsore-adibideak"
            name: sensor_examples
            widget: list
            field: { label: "Adibidea", name: item, widget: string }
          - label: "Argazkia — Sentsorea"
            name: sensor_photo
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - { label: "Eragile-izenburua", name: actuator_heading, widget: string }
          - { label: "Eragile-deskribapena", name: actuator_description, widget: text }
          - label: "Eragile-adibideak"
            name: actuator_examples
            widget: list
            field: { label: "Adibidea", name: item, widget: string }
          - label: "Argazkia — Eragilea"
            name: actuator_photo
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - label: "Adibide errealak"
            name: real_examples
            widget: list
            fields:
              - { label: "Izenburua", name: title, widget: string }
              - { label: "Sarrera", name: input, widget: string }
              - { label: "Irteera", name: output, widget: string }
          - label: "SPIKE osagaiak"
            name: spike_components
            widget: list
            fields:
              - label: "Mota"
                name: type
                widget: select
                options:
                  - { label: "Sentsorea", value: "sensor" }
                  - { label: "Eragilea", value: "actuator" }
                  - { label: "Biak", value: "both" }
              - { label: "Ikonoa (emoji)", name: icon, widget: string }
              - { label: "Izena", name: name, widget: string }
              - { label: "Deskribapena", name: description, widget: text }
          - label: "Argazkia — SPIKE kit osoa (goikoa)"
            name: spike_photo_top
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - label: "Argazkia — Hub-a gertu (behekoa)"
            name: spike_photo_bottom
            widget: object
            fields:
              - { label: "Argazkia", name: image, widget: image, required: false }
              - { label: "Deskribapena (argazkirik ez badago)", name: description, widget: text, required: false }
          - label: "Sailkatu ariketa — elementuak"
            name: classify_items
            widget: list
            fields:
              - { label: "Etiketa", name: label, widget: string }
              - label: "Kategoria zuzena"
                name: correct
                widget: select
                options:
                  - { label: "Sentsorea", value: "sentsore" }
                  - { label: "Eragilea", value: "eragile" }
          - label: "Laburpena"
            name: summary
            widget: object
            fields:
              - { label: "Izenburua", name: heading, widget: string }
              - { label: "Sarrera", name: intro, widget: string }
              - label: "Puntuak"
                name: points
                widget: list
                field: { label: "Puntua", name: item, widget: string }
              - { label: "Hurrengo blokea", name: next, widget: string }
          - label: "Ariketak (test galderak)"
            name: quiz
            widget: list
            label_singular: "Galdera"
            fields:
              - { label: "Galdera", name: question, widget: text }
              - label: "Aukerak"
                name: options
                widget: list
                field: { label: "Aukera", name: item, widget: string }
              - { label: "Erantzun zuzena (0-3)", name: correct, widget: number, value_type: int }
              - { label: "Feedbacka", name: feedback, widget: text }

      - name: t3a
